name: Frontend CI

on:
  push:
    branches: [develop, main]
    # ✅ Only run if frontend code actually changes
    paths:
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          # ✅ Path to the lockfile inside the frontend folder
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        # ✅ Highly recommended to catch UI bugs before build
        run: npm run lint
        continue-on-error: false

      - name: Build
        run: npm run build
